<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download — KIIN Client</title>
    <meta name="description" content="Download KIIN Client for Windows, Linux, or macOS. Free forever.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            background: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
 
        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #1a1a1a;
            border-bottom: 2px solid #aa44ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
 
        nav img {
            height: 45px;
            image-rendering: pixelated;
        }
 
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 15px;
            transition: color 0.2s;
        }
 
        nav a:hover { color: #aa44ff; }
 
        nav a.active {
            color: #aa44ff;
            border-bottom: 2px solid #aa44ff;
            padding-bottom: 2px;
        }
 
        /* PAGE */
        .download-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
            overflow: hidden;
        }
 
        .download-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%,
                        #aa44ff15 0%, transparent 65%);
            pointer-events: none;
        }
 
        .download-page h1 {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 12px;
            position: relative;
        }
 
        .download-page h1 span { color: #aa44ff; }
 
        .download-page .subtitle {
            color: #777777;
            font-size: 16px;
            margin-bottom: 60px;
            position: relative;
        }
 
        /* OS CARDS */
        .os-cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
        }
 
        .os-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 40px 36px;
            width: 220px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
 
        .os-card:hover {
            border-color: #aa44ff;
            transform: translateY(-6px);
            box-shadow: 0 12px 40px #aa44ff22;
        }
 
        .os-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
        }
 
        .os-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
 
        .os-req {
            font-size: 12px;
            color: #666666;
            margin-top: -4px;
        }
 
        .os-badge {
            margin-top: 8px;
            background: #aa44ff;
            color: #000000;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 20px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
 
        .os-card:hover .os-badge {
            background: #8822dd;
        }
 
        /* BACK LINK */
        .back-link {
            margin-top: 48px;
            color: #444444;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
            position: relative;
        }
 
        .back-link:hover { color: #aa44ff; }
 
        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #333333;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
        }
 
        footer span { color: #aa44ff; }
 
        /* REDUCED MOTION */
        @media (prefers-reduced-motion: reduce) {
            .os-card, nav a { transition: none; }
            .os-card:hover { transform: none; }
        }
 
        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                padding: 20px 30px;
                flex-direction: column;
                gap: 15px;
            }
 
            nav a { margin-left: 15px; }
 
            .download-page h1 { font-size: 36px; }
 
            .os-cards { flex-direction: column; align-items: center; }
 
            .os-card { width: 100%; max-width: 280px; }
        }
    </style>
</head>
