<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIIN Client | Download</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --accent: #00aaff;
            --accent-hover: #0088cc;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav img { height: 45px; image-rendering: pixelated; }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 30px;
            transition: 0.2s;
        }

        nav a:hover { color: var(--accent); }

        /* HERO */
        .hero {
            text-align: center;
            padding: 140px 20px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-main) 100%);
        }

        .hero h1 {
            font-size: 72px;
            color: var(--accent);
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
        }

        .hero p { color: var(--text-muted); margin-bottom: 40px; }

        /* DOWNLOAD BUTTONS */
        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.4);
        }

        /* MODAL (The Popup) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .os-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .os-card {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .os-card:hover {
            border-color: var(--accent);
            background: #2a2a2a;
        }

        .os-info { text-align: left; }
        .os-name { font-weight: bold; color: var(--accent); }
        .os-ver { font-size: 12px; color: #777; }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 40px;
            color: #333;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="KIIN">
        <div>
            <a href="index.html">Home</a>
            <a href="https://github.com/KIINClient" target="_blank">GitHub</a>
        </div>
    </nav>

    <header class="hero">
        <h1>KIIN CLIENT</h1>
        <p>Select your platform to begin the installation.</p>
        <button class="btn-primary" onclick="openModal()">Download Free</button>
    </header>

    <div class="modal-overlay" id="downloadModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>Choose Your OS</h2>
            <p style="color: #666; font-size: 14px; margin-top: 5px;">Select the version compatible with your device</p>
            
            <div class="os-list">
                <a href="#" class="os-card">
                    <div class="os-info">
                        <div class="os-name">Windows</div>
                        <div class="os-ver">Win 10 and above</div>
                    </div>
                    <span>&darr;</span>
                </a>

                <a href="#" class="os-card">
                    <div class="os-info">
                        <div class="os-name">macOS</div>
                        <div class="os-ver">macOS 14 (Sonoma)</div>
                    </div>
                    <span>&darr;</span>
                </a>

                <a href="#" class="os-card">
                    <div class="os-info">
                        <div class="os-name">Linux</div>
                        <div class="os-ver">Distributed as an AppImage</div>
                    </div>
                    <span>&darr;</span>
                </a>
            </div>
        </div>
    </div>

    <footer>
        © 2026 <span style="color: var(--accent)">KIIN Client</span> — Performance First
    </footer>

    <script>
        const modal = document.getElementById('downloadModal');

        function openModal() {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling when open
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }

        // Close modal if user clicks outside of the box
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
